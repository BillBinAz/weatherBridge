name: Test on Pull Request

on:
  pull_request:
    branches: [ "develop", "dev", "feature/*", "master" ]

permissions:
  contents: read
  pull-requests: write

jobs:

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13", "3.14"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install flake8 coverage
          pip install -r requirements.txt

      - name: Lint with flake8 - Critical errors
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics \
            --exclude=.git,.github,.venv,__pycache__,.pytest_cache,docs

      - name: Lint with flake8 - All errors (non-blocking)
        continue-on-error: true
        run: |
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 \
            --statistics --exclude=.git,.github,.venv,__pycache__,.pytest_cache,docs

      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=./src" >> $GITHUB_ENV

      - name: Run tests with coverage
        run: |
          coverage run -m unittest discover tests/ -v
          coverage report
          coverage xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
          verbose: true

      - name: Add coverage comment to PR
        if: always()
        uses: py-cov-action/python-coverage-comment-action@v3
        with:
          GITHUB_TOKEN: ${{ github.token }}

