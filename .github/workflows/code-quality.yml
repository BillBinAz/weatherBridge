name: Code Quality

on:
  push:
    branches: [ "master", "develop" ]
  pull_request:
    branches: [ "master", "develop" ]

permissions:
  contents: read
  pull-requests: write

jobs:
  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: 'pip'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install pylint mypy flake8 black isort
          pip install -r requirements.txt

      - name: Check code formatting with Black
        continue-on-error: true
        run: |
          black --check src/ tests/

      - name: Check import sorting with isort
        continue-on-error: true
        run: |
          isort --check-only src/ tests/

      - name: Run pylint
        continue-on-error: true
        run: |
          pylint src/ --disable=C0111,C0103,R0801 --max-line-length=127 --output-format=colorized

      - name: Run mypy type checking
        continue-on-error: true
        run: |
          mypy src/ --ignore-missing-imports

      - name: Generate code complexity report
        continue-on-error: true
        run: |
          python -m pip install radon
          radon cc src/ -a --json

      - name: Generate code metrics report
        continue-on-error: true
        run: |
          radon mi src/ -nb

      - name: Comment PR with quality report
        if: github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const comment = `## 📊 Code Quality Report\n\nCode quality checks have been completed. Please review the workflow logs for detailed results.`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

