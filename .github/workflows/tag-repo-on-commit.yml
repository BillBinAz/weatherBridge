name: Tag on Commit to Master

on:
  push:
    branches: [ "master" ]

permissions:
  contents: write
  packages: write
  actions: read

jobs:

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13", "3.14"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install flake8 coverage
          pip install -r requirements.txt

      - name: Lint with flake8 - Critical errors
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics \
            --exclude=.git,.github,.venv,__pycache__,.pytest_cache,docs

      - name: Lint with flake8 - All errors (non-blocking)
        continue-on-error: true
        run: |
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 \
            --statistics --exclude=.git,.github,.venv,__pycache__,.pytest_cache,docs

      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=./src" >> $GITHUB_ENV

      - name: Run tests with coverage
        run: |
          coverage run -m unittest discover tests/ -v
          coverage report
          coverage xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
          verbose: true

  tag_on_release:
    name: Tag on release
    needs: test
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: write
      actions: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Debug - Check git status
        run: |
          echo "Current branch: $(git rev-parse --abbrev-ref HEAD)"
          echo "Last commit: $(git log -1 --pretty=%B)"
          echo "Tags count: $(git tag | wc -l)"
          git log --oneline -10

      - name: Bump version and push tag
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          create_annotated_tag: true
          default_bump: patch
          release_branches: master

      - name: Debug - Tag creation result
        run: |
          echo "New tag: ${{ steps.tag_version.outputs.new_tag }}"
          echo "Previous tag: ${{ steps.tag_version.outputs.previous_tag }}"
          echo "Changed files: ${{ steps.tag_version.outputs.changed_files }}"

      - name: Create a GitHub release
        if: steps.tag_version.outputs.new_tag
        uses: ncipollo/release-action@v1.21.0
        with:
          tag: ${{ steps.tag_version.outputs.new_tag }}
          name: Release ${{ steps.tag_version.outputs.new_tag }}
          body: ${{ steps.tag_version.outputs.changelog }}
          draft: false
          prerelease: false
          generateReleaseNotes: true

      - name: Debug - Release creation
        if: steps.tag_version.outputs.new_tag
        run: |
          echo "Release created for tag: ${{ steps.tag_version.outputs.new_tag }}"
          git tag -l | tail -5
